server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip básico
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets versionados pelo Vite (filename com hash) — cache longo e imutável.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: qualquer rota client-side cai no index.html, que carrega o
    # router no navegador e resolve a navegação localmente.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
